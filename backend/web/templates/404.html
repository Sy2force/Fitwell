{% extends 'web/base.html' %}
{% load i18n %}

{% block title %}{% trans "404 - Zone Inconnue" %}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-background">
    <!-- Background Elements -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/10 blur-[150px] rounded-full -z-10 animate-pulse-slow"></div>
    <div class="absolute inset-0 z-0 opacity-20 pointer-events-none bg-grid bg-grid-primary">
    </div>

    <div class="text-center px-4 relative z-10">
        <h1 class="text-9xl font-display font-bold text-transparent bg-clip-text bg-gradient-to-b from-white to-primary italic mb-4 drop-shadow-[0_0_15px_rgba(0,243,255,0.5)]">
            404
        </h1>
        <h2 class="text-2xl md:text-4xl font-bold text-white mb-6 uppercase tracking-widest font-display italic">
            {% trans "Signal Perdu" %}
        </h2>
        <p class="text-gray-400 max-w-md mx-auto mb-12 font-mono text-sm border-l-2 border-primary/50 pl-4 text-left">
            {% trans "L'URL demandée n'existe pas dans le protocole. Recalibrage nécessaire." %}
        </p>
        
        <a href="{% url 'home' %}" class="inline-flex items-center px-8 py-4 bg-surface/50 border border-primary/30 hover:bg-primary/10 hover:border-primary text-white rounded font-mono transition-all duration-300 uppercase tracking-widest text-xs group shadow-[0_0_20px_rgba(0,243,255,0.2)]">
            <span class="mr-2 text-primary group-hover:translate-x-[-2px] transition-transform">←</span> {% trans "Retour à la Base" %}
        </a>
    </div>
</div>
{% endblock %}
