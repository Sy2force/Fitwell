{% extends 'web/base.html' %}
{% load i18n %}

{% block title %}{% trans "Niveau" %} - FitWell{% endblock %}

{% block content %}
<div class="min-h-screen bg-void flex items-center justify-center px-4">
    <div class="max-w-3xl w-full">
        <div class="card-glass border-neon-secondary py-12 px-8">
            <div class="text-center mb-8">
                <div class="text-secondary text-sm font-mono mb-2">{% trans "ÉTAPE 2/4" %}</div>
                <h1 class="text-4xl font-display text-white mb-4">
                    {% trans "Quel est ton niveau d'activité ?" %}
                </h1>
            </div>

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                
                <div class="space-y-3">
                    <label class="cursor-pointer block">
                        <input type="radio" name="activity_level" value="sedentary" class="peer hidden" required>
                        <div class="card-glass border-2 border-gray-700 peer-checked:border-primary peer-checked:bg-primary/10 p-5 transition-all hover:border-primary/50">
                            <div class="flex items-center gap-4">
                                <div class="text-3xl">🪑</div>
                                <div class="flex-1">
                                    <div class="text-white font-semibold">{% trans "Sédentaire" %}</div>
                                    <div class="text-gray-400 text-sm">{% trans "Peu ou pas d'exercice" %}</div>
                                </div>
                            </div>
                        </div>
                    </label>

                    <label class="cursor-pointer block">
                        <input type="radio" name="activity_level" value="moderate" class="peer hidden">
                        <div class="card-glass border-2 border-gray-700 peer-checked:border-secondary peer-checked:bg-secondary/10 p-5 transition-all hover:border-secondary/50">
                            <div class="flex items-center gap-4">
                                <div class="text-3xl">🚶</div>
                                <div class="flex-1">
                                    <div class="text-white font-semibold">{% trans "Modéré" %}</div>
                                    <div class="text-gray-400 text-sm">{% trans "1-3 fois par semaine" %}</div>
                                </div>
                            </div>
                        </div>
                    </label>

                    <label class="cursor-pointer block">
                        <input type="radio" name="activity_level" value="active" class="peer hidden">
                        <div class="card-glass border-2 border-gray-700 peer-checked:border-energy peer-checked:bg-energy/10 p-5 transition-all hover:border-energy/50">
                            <div class="flex items-center gap-4">
                                <div class="text-3xl">🏃</div>
                                <div class="flex-1">
                                    <div class="text-white font-semibold">{% trans "Actif" %}</div>
                                    <div class="text-gray-400 text-sm">{% trans "3-5 fois par semaine" %}</div>
                                </div>
                            </div>
                        </div>
                    </label>

                    <label class="cursor-pointer block">
                        <input type="radio" name="activity_level" value="elite" class="peer hidden">
                        <div class="card-glass border-2 border-gray-700 peer-checked:border-health peer-checked:bg-health/10 p-5 transition-all hover:border-health/50">
                            <div class="flex items-center gap-4">
                                <div class="text-3xl">💪</div>
                                <div class="flex-1">
                                    <div class="text-white font-semibold">{% trans "Élite" %}</div>
                                    <div class="text-gray-400 text-sm">{% trans "6-7 fois par semaine" %}</div>
                                </div>
                            </div>
                        </div>
                    </label>
                </div>

                <div class="flex justify-between pt-8">
                    <a href="{% url 'onboarding_step1' %}" class="btn-secondary">
                        ← {% trans "Retour" %}
                    </a>
                    <button type="submit" class="btn-primary">
                        {% trans "Suivant" %} →
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
