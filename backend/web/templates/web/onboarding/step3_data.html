{% extends 'web/base.html' %}
{% load i18n %}

{% block title %}{% trans "Données" %} - FitWell{% endblock %}

{% block content %}
<div class="min-h-screen bg-void flex items-center justify-center px-4">
    <div class="max-w-2xl w-full">
        <div class="card-glass border-neon-energy py-12 px-8">
            <div class="text-center mb-8">
                <div class="text-energy text-sm font-mono mb-2">{% trans "ÉTAPE 3/4" %}</div>
                <h1 class="text-4xl font-display text-white mb-4">
                    {% trans "Tes données biométriques" %}
                </h1>
            </div>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-white font-semibold mb-2">{% trans "Genre" %}</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="gender" value="male" class="peer hidden" required>
                            <div class="card-glass border-2 border-gray-700 peer-checked:border-primary peer-checked:bg-primary/10 p-4 text-center transition-all">
                                <div class="text-2xl mb-2">👨</div>
                                <div class="text-white">{% trans "Homme" %}</div>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="gender" value="female" class="peer hidden">
                            <div class="card-glass border-2 border-gray-700 peer-checked:border-secondary peer-checked:bg-secondary/10 p-4 text-center transition-all">
                                <div class="text-2xl mb-2">👩</div>
                                <div class="text-white">{% trans "Femme" %}</div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-white font-semibold mb-2">{% trans "Âge" %}</label>
                        <input type="number" name="age" required min="15" max="100" class="w-full bg-gray-900 text-white border border-gray-700 rounded-lg px-4 py-3 focus:border-primary focus:outline-none" placeholder="25">
                    </div>
                    <div>
                        <label class="block text-white font-semibold mb-2">{% trans "Taille (cm)" %}</label>
                        <input type="number" name="height" required min="140" max="220" class="w-full bg-gray-900 text-white border border-gray-700 rounded-lg px-4 py-3 focus:border-primary focus:outline-none" placeholder="175">
                    </div>
                </div>

                <div>
                    <label class="block text-white font-semibold mb-2">{% trans "Poids (kg)" %}</label>
                    <input type="number" name="weight" required min="40" max="200" step="0.1" class="w-full bg-gray-900 text-white border border-gray-700 rounded-lg px-4 py-3 focus:border-primary focus:outline-none" placeholder="75">
                </div>

                <div class="flex justify-between pt-8">
                    <a href="{% url 'onboarding_step2' %}" class="btn-secondary">
                        ← {% trans "Retour" %}
                    </a>
                    <button type="submit" class="btn-primary">
                        {% trans "Générer mon Plan" %} 🚀
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
