services:
  # PostgreSQL Database
  - type: pserv
    name: fitwell-db
    env: python
    plan: free
    databaseName: fitwell_db
    user: fitwell_user

  # Django Web Service
  - type: web
    name: fitwell-monolith
    env: python
    plan: free
    buildCommand: "cd backend && python3 -m pip install --upgrade pip && python3 -m pip install -r requirements.txt && python3 manage.py collectstatic --noinput && python3 manage.py migrate && python3 manage.py seed_db"
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: "*"
      - key: LANGUAGE_CODE
        value: "fr-fr"
      - key: TIME_ZONE
        value: "Europe/Paris"
      - key: DATABASE_URL
        fromDatabase:
          name: fitwell-db
          property: connectionString
