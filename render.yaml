services:
  - type: web
    name: fitwell-monolith
    env: python
    region: frankfurt
    plan: free
    buildCommand: |
      echo "Starting build process..."
      chmod +x backend/build_files.sh
      ./backend/build_files.sh
      echo "Seeding database..."
      cd backend
      python3 manage.py seed_db
      python3 manage.py seed_exercises
      python3 manage.py seed_blog
      python3 manage.py seed_badges
      python3 manage.py seed_recipes
      echo "Build completed!"
    startCommand: |
      cd backend
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: fitwell-db
          property: connectionString

databases:
  - name: fitwell-db
    databaseName: fitwell
    user: fitwell_user
    plan: free
    region: frankfurt
