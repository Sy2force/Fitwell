services:
  - type: web
    name: fitwell-monolith
    env: python
    region: frankfurt
    plan: free
    buildCommand: |
      cd backend
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput --clear
      python manage.py compilemessages || echo "No translations"
      python manage.py seed_db || echo "Seed skipped"
      python manage.py seed_exercises || echo "Seed skipped"
      python manage.py seed_blog || echo "Seed skipped"
      python manage.py seed_badges || echo "Seed skipped"
      python manage.py seed_recipes || echo "Seed skipped"
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DISABLE_COLLECTSTATIC
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: fitwell-db
          property: connectionString

databases:
  - name: fitwell-db
    databaseName: fitwell
    user: fitwell_user
    plan: free
    region: frankfurt
