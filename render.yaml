databases:
  - name: fitwell-db
    databaseName: fitwell_db
    user: fitwell_user
    plan: free

services:
  - type: web
    name: fitwell-monolith
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py compilemessages"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2"
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: LANGUAGE_CODE
        value: en
      - key: TIME_ZONE
        value: UTC
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: fitwell-db
          property: connectionString
