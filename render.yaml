services:
  - type: web
    name: fitwell-monolith
    env: python
    region: frankfurt
    plan: free
    buildCommand: |
      echo "==> Installing dependencies..."
      python3 -m pip install --upgrade pip
      python3 -m pip install -r backend/requirements.txt
      echo "==> Applying migrations..."
      cd backend
      python3 manage.py makemigrations --noinput
      python3 manage.py migrate --noinput
      echo "==> Collecting static files..."
      python3 manage.py collectstatic --noinput --clear
      echo "==> Compiling translations..."
      python3 manage.py compilemessages || echo "No translations to compile"
      echo "==> Seeding database..."
      python3 manage.py seed_db
      python3 manage.py seed_exercises
      python3 manage.py seed_blog
      python3 manage.py seed_badges
      python3 manage.py seed_recipes
      echo "==> Build completed!"
    startCommand: |
      cd backend
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: fitwell-db
          property: connectionString

databases:
  - name: fitwell-db
    databaseName: fitwell
    user: fitwell_user
    plan: free
    region: frankfurt
