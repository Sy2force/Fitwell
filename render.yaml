services:
  # PostgreSQL Database
  - type: pserv
    name: fitwell-db
    env: python
    plan: free
    databaseName: fitwell_db
    user: fitwell_user

  # Django Web Service - Configuration Optimale
  - type: web
    name: fitwell-monolith
    env: python
    plan: free
    runtime: python3.9
    region: oregon
    buildCommand: |
      cd backend &&
      python3 -m pip install --upgrade pip &&
      python3 -m pip install -r requirements.txt &&
      python3 manage.py collectstatic --noinput --clear &&
      python3 manage.py migrate --noinput &&
      python3 manage.py compilemessages ||
      echo "Compilation messages skipped"
    startCommand: |
      cd backend &&
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3
    healthCheckPath: /fr/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: "*"
      - key: LANGUAGE_CODE
        value: "fr"
      - key: TIME_ZONE
        value: "UTC"
      - key: DATABASE_URL
        fromDatabase:
          name: fitwell-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.9"
